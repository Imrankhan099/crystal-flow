name: Android Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform-version: 34
          sdk-build-tools-version: 34.0.0

      - name: Install dependencies
        run: npm install

      - name: Ensure icon assets exist
        run: |
          mkdir -p assets
          for f in icon.png adaptive-icon.png favicon.png; do
            if [ ! -f "assets/$f" ]; then
              convert -size 1024x1024 xc:'#F2F6FF' "assets/$f"
              echo "Created placeholder assets/$f"
            fi
          done

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
