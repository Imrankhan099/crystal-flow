name: Android Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform-version: 34
          sdk-build-tools-version: 34.0.0

      - name: Install dependencies
        run: npm install

      - name: Ensure icon assets exist
        run: |
          mkdir -p assets
          python3 - <<'PY'
          import struct, zlib, os
          def make_png(path, size=1024):
              raw = b"\x00" + b"\xff\xf2\xf6\xff" * size
              raw = raw * size
              def chunk(typ, data):
                c = typ + data
                return struct.pack(">I", len(data)) + c + struct.pack(">I", zlib.crc32(c) & 0xffffffff)
              sig = b"\x89PNG\r\n\x1a\n"
              ihdr = struct.pack(">IIBBBBB", size, size, 8, 6, 0, 0, 0)
              idat = zlib.compress(raw, 9)
              with open(path, "wb") as f:
                f.write(sig + chunk(b"IHDR", ihdr) + chunk(b"IDAT", idat) + chunk(b"IEND", b""))
          for f in ["icon.png", "adaptive-icon.png", "favicon.png"]:
            if not os.path.exists(os.path.join("assets", f)):
              make_png(os.path.join("assets", f))
              print(f"Created placeholder assets/{f}")
          PY

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
